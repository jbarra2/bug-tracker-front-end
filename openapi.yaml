  /v1/me/ratings:
    get:
      tags: [Me]
      summary: List my ratings
      description: >
        Returns a paginated list of the authenticated user's ratings, each enriched with TMDB metadata.
        The caller is always determined from the JWT — query parameters cannot override identity.
        If TMDB is unavailable for a given item, the `tmdb` field is `null` rather than failing the whole request.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          description: Page number (positive integer). Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: pageSize
          required: false
          description: Number of results per page (max 50). Defaults to 10.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
      responses:
        "200":
          description: Paginated list of enriched ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichedRatingListResponse"
              examples:
                success:
                  value:
                    page: 1
                    pageSize: 10
                    totalPages: 1
                    totalResults: 1
                    results:
                      - id: 1
                        tmdbId: 550
                        mediaType: movie
                        score: 8
                        createdAt: "2026-01-01T00:00:00.000Z"
                        updatedAt: "2026-01-01T00:00:00.000Z"
                        author:
                          id: 1
                          username: alice
                        tmdb:
                          title: Fight Club
                          year: 1999
                          posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                          overview: An insomniac office worker crosses paths with a soap maker.
                tmdbUnavailable:
                  summary: TMDB upstream failure — tmdb is null
                  value:
                    page: 1
                    pageSize: 10
                    totalPages: 1
                    totalResults: 1
                    results:
                      - id: 1
                        tmdbId: 550
                        mediaType: movie
                        score: 8
                        createdAt: "2026-01-01T00:00:00.000Z"
                        updatedAt: "2026-01-01T00:00:00.000Z"
                        author:
                          id: 1
                          username: alice
                        tmdb: null
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Auth² OIDC bearer token (RS256, validated against the issuer JWKS).

        | Field    | Value                                |
        |----------|--------------------------------------|
        | Issuer   | `https://tcss-460-iam.onrender.com`  |
        | Audience | `group-2-api`                        |

        Obtain a token from the TCSS 460 Auth² Token Playground at the issuer URL,
        then pass it as `Authorization: Bearer <token>`.

        Tokens whose `iss` does not match the issuer above, or whose `aud` does not
        contain `group-2-api`, are rejected with 401.

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            missingToken:
              value:
                error: Missing or malformed Authorization header
            invalidToken:
              value:
                error: Invalid or expired token
    ForbiddenError:
      description: Authenticated user does not have permission to modify this resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            forbidden:
              value:
                error: You do not have permission to modify this resource
            insufficientPermissions:
              value:
                error: Insufficient permissions
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          examples:
            generic:
              value:
                error: Internal server error

  schemas:
    MediaType:
      type: string
      enum: [movie, show]
      example: movie

    ApiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Internal server error

    UserContentAuthor:
      type: object
      description: >
        Public author surface on every review and rating response. The `username` value is a display label:
        it uses the stored username when non-empty after trimming; otherwise trimmed first and last name, or
        `user-` plus the first eight characters of the user's external subject id.
      required:
        - id
        - username
      properties:
        id:
          type: integer
          description: Local database user id for the author.
          example: 42
        username:
          type: string
          description: Resolved display name for the author (see schema description for fallback rules).
          example: reviews-int-owner

    ReviewResponse:
      type: object
      required:
        - id
        - mediaType
        - title
        - body
        - createdAt
        - updatedAt
        - author
      properties:
        id:
          type: integer
          example: 101
        mediaType:
          $ref: "#/components/schemas/MediaType"
        title:
          type: string
          nullable: true
          example: Great watch
        body:
          type: string
          example: This movie stayed sharp, focused, and worth revisiting.
        createdAt:
          type: string
          format: date-time
          example: "2026-04-26T18:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-26T18:30:00.000Z"
        author:
          $ref: "#/components/schemas/UserContentAuthor"

    ReviewListResponse:
      type: object
      required:
        - page
        - pageSize
        - totalPages
        - totalResults
        - results
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 1
        totalResults:
          type: integer
          example: 1
        results:
          type: array
          items:
            $ref: "#/components/schemas/ReviewResponse"

    ReviewCreateRequest:
      type: object
      required:
        - tmdbId
        - mediaType
        - body
      properties:
        tmdbId:
          type: integer
          minimum: 1
          example: 550
        mediaType:
          $ref: "#/components/schemas/MediaType"
        title:
          type: string
          nullable: true
          maxLength: 120
          example: Great watch
        body:
          type: string
          minLength: 10
          maxLength: 5000
          example: This movie stayed sharp, focused, and worth revisiting.

    ReviewUpdateRequest:
      type: object
      required:
        - body
      properties:
        title:
          type: string
          nullable: true
          maxLength: 120
          example: Great watch
        body:
          type: string
          minLength: 10
          maxLength: 5000
          example: This movie stayed sharp, focused, and worth revisiting.

    MediaListItem:
      type: object
      required:
        - id
        - title
        - year
        - posterUrl
        - overview
        - mediaType
      properties:
        id:
          type: integer
          description: TMDB identifier exposed as `id` in API responses.
          example: 550
        title:
          type: string
          example: Fight Club
        year:
          type: integer
          nullable: true
          example: 1999
        posterUrl:
          type: string
          nullable: true
          example: https://image.tmdb.org/t/p/w500/example.jpg
        overview:
          type: string
          example: An insomniac office worker crosses paths with a soap maker.
        mediaType:

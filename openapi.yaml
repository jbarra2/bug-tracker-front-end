openapi: 3.0.3
info:
  title: Group 2 Movie and TV Review API
  version: 4.0.0
  description: |
    Sprint 4 backend API for TCSS 460 Group 2.
    Proxies TMDB for media data and persists user ratings, reviews, and bug reports via PostgreSQL.
    Versioned resources are documented under `/v1/...`; `/api/v1/...` remains supported as a compatibility alias.

    ## Authentication

    Mutation routes and admin routes require an Auth² OIDC bearer token.
    - **Issuer:** `https://tcss-460-iam.onrender.com` (Auth²)
    - **Audience:** `group-2-api`
    - **Algorithm:** `RS256`, validated against the issuer's JWKS
    - **How to mint a token:** the TCSS 460 Auth² Token Playground at the issuer URL above

    Pass tokens as `Authorization: Bearer <token>`. Public routes (health, TMDB proxy reads,
    public `GET` ratings/reviews, public `POST /v1/issues`) do not require a token.

servers:
  - url: https://group-2-9289.onrender.com
    description: Production deployment
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Auth2 bearer token usage
  - name: Movies
    description: Movie routes proxied from TMDB
  - name: TV Shows
    description: TV show routes proxied from TMDB
  - name: Discover
    description: Public community discovery feeds built from SQL aggregates plus TMDB metadata
  - name: Ratings
    description: User ratings for movies and TV shows
  - name: Reviews
    description: User review routes for movies and shows
  - name: Issues
    description: Public bug report intake — no authentication required
  - name: Me
    description: Authenticated user's own content (ratings, future reviews)

paths:
  /health:
    get:
      tags: [Health]
      summary: Heartbeat
      description: Returns a simple JSON response confirming the API is running.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: group-project-backend-group-2-3

  /v1/discover/top-rated:
    get:
      tags: [Discover]
      summary: List top-rated community picks
      description: >
        Returns a public discovery feed ranked by average local rating, using a SQL aggregate over local
        ratings and live TMDB metadata enrichment for each item on the current page. Each item is a title-level
        rollup (`averageScore`, `ratingCount`, TMDB metadata only); it does not embed individual rating rows
        or per-rater `author` objects, which is intentional for this aggregate feed.
      parameters:
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: pageSize
          required: false
          description: Positive integer page size up to 50. Defaults to 10.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
      responses:
        "200":
          description: Paginated list of top-rated community-ranked items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverFeedResponse"
              examples:
                success:
                  value:
                    page: 1
                    pageSize: 2
                    totalPages: 1
                    totalResults: 2
                    results:
                      - tmdbId: 550
                        mediaType: movie
                        averageScore: 9.5
                        ratingCount: 4
                        tmdb:
                          title: Fight Club
                          year: 1999
                          overview: An insomniac office worker crosses paths with a soap maker.
                          posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                      - tmdbId: 1396
                        mediaType: show
                        averageScore: 9
                        ratingCount: 5
                        tmdb:
                          title: Breaking Bad
                          year: 2008
                          overview: A high school chemistry teacher turned meth producer.
                          posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidPageSize:
                  value:
                    error: Query parameter pageSize must be 50 or less

  /v1/movies/search:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: Searches TMDB for movies and returns a transformed paginated list.
      parameters:
        - in: query
          name: title
          required: true
          description: Movie title query.
          schema:
            type: string
            minLength: 1
          example: Fight Club
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: Paginated list of matching movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 5
                    totalResults: 92
                    results:
                      - id: 550
                        title: Fight Club
                        year: 1999
                        posterUrl: https://image.tmdb.org/t/p/w500/example.jpg
                        overview: An insomniac office worker crosses paths with a soap maker.
                        mediaType: movie
        "400":
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingTitle:
                  value:
                    error: Query parameter title is required
                invalidPage:
                  value:
                    error: Query parameter page must be a positive integer
        "502":
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamFailure:
                  value:
                    error: TMDB request failed with status 500
                genericFailure:
                  value:
                    error: Internal server error

  /v1/movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns popular TMDB movies as a transformed paginated list.
      parameters:
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: Paginated list of popular movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 500
                    totalResults: 10000
                    results:
                      - id: 550
                        title: Fight Club
                        year: 1999
                        posterUrl: https://image.tmdb.org/t/p/w500/example.jpg
                        overview: An insomniac office worker crosses paths with a soap maker.
                        mediaType: movie
        "400":
          description: Invalid page parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidPage:
                  value:
                    error: Query parameter page must be a positive integer
        "502":
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamFailure:
                  value:
                    error: TMDB request failed with status 500
                genericFailure:
                  value:
                    error: Internal server error

  /v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get movie details by id
      description: Returns transformed details for a single movie.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive movie id.
          schema:
            type: integer
            minimum: 1
          example: 550
      responses:
        "200":
          description: Movie details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetailResponse"
              examples:
                success:
                  value:
                    id: 550
                    title: Fight Club
                    year: 1999
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: An insomniac office worker crosses paths with a soap maker.
                    genres: [Drama]
                    runtimeMinutes: 139
                    status: Released
                    rating: 8.4
                    community:
                      averageScore: 7.5
                      ratingCount: 42
                      reviewCount: 12
                      recentReviews: []
                successWithRecentReviews:
                  summary: Movie detail with recent community reviews (each includes author)
                  value:
                    id: 550
                    title: Fight Club
                    year: 1999
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: An insomniac office worker crosses paths with a soap maker.
                    genres: [Drama]
                    runtimeMinutes: 139
                    status: Released
                    rating: 8.4
                    community:
                      averageScore: 8.0
                      ratingCount: 10
                      reviewCount: 3
                      recentReviews:
                        - id: 1201
                          mediaType: movie
                          title: Still relevant
                          body: >-
                            The performances and editing hold up; worth a rewatch even years later.
                          createdAt: "2026-05-01T12:00:00.000Z"
                          updatedAt: "2026-05-01T12:00:00.000Z"
                          author:
                            id: 12
                            username: moviefan
        "404":
          description: Movie not found or invalid movie ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidId:
                  value:
                    error: Movie not found
                notFound:
                  value:
                    error: The resource you requested could not be found.
        "502":
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamError:
                  value:
                    error: TMDB request failed with status 500
                genericFailure:
                  value:
                    error: Internal server error

  /v1/tv-shows/search:
    get:
      tags: [TV Shows]
      summary: Search shows by title
      description: Searches TMDB TV shows and returns a transformed paginated list.
      parameters:
        - in: query
          name: title
          required: true
          description: Show title search string.
          schema:
            type: string
            minLength: 1
          example: lost
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: Paginated list of matching shows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 2
                    totalResults: 40
                    results:
                      - id: 4607
                        title: Lost
                        year: 2004
                        posterUrl: https://image.tmdb.org/t/p/w500/ogbwjg3we0UppYjVJwVH15BReqA.jpg
                        overview: The survivors of a plane crash are forced to work together in order to survive on a seemingly deserted tropical island.
                        mediaType: show
        "400":
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingTitle:
                  value:
                    error: title is required
                invalidPage:
                  value:
                    error: page must be a positive integer
        "502":
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamFailure:
                  value:
                    error: Invalid API key
                genericFailure:
                  value:
                    error: Internal server error

  /v1/tv-shows/popular:
    get:
      tags: [TV Shows]
      summary: Get popular shows
      description: Returns popular TMDB TV shows as a transformed paginated list.
      parameters:
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: Paginated list of popular shows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 1000
                    totalResults: 20000
                    results:
                      - id: 95557
                        title: Invincible
                        year: 2021
                        posterUrl: https://image.tmdb.org/t/p/w500/yDWJYRAwMNKbIYT8ZB33qy84uzO.jpg
                        overview: An adult animated series based on the Skybound/Image comic about a teenager whose father is the most powerful superhero on the planet.
                        mediaType: show
        "400":
          description: Invalid page parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidPage:
                  value:
                    error: page must be a positive integer
        "502":
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamFailure:
                  value:
                    error: Invalid API key
                genericFailure:
                  value:
                    error: Internal server error

  /v1/tv-shows/{id}:
    get:
      tags: [TV Shows]
      summary: Get show details by id
      description: |
        Returns TMDB metadata for a single TV show plus a `community` object with
        local average score, rating and review counts, and recent reviews (newest first).
        The same shape is used for empty local data (null average, zero counts, empty recent reviews).
      parameters:
        - in: path
          name: id
          required: true
          description: Positive show id.
          schema:
            type: integer
            minimum: 1
          example: 1396
      responses:
        "200":
          description: Show details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowDetailResponse"
              examples:
                success:
                  value:
                    id: 1396
                    title: Breaking Bad
                    year: 2008
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: A high school chemistry teacher turned methamphetamine manufacturer.
                    genres: [Drama]
                    seasonCount: 5
                    episodeCount: 62
                    status: Ended
                    rating: 8.9
                    community:
                      averageScore: null
                      ratingCount: 0
                      reviewCount: 0
                      recentReviews: []
                successWithLocalReviews:
                  value:
                    id: 1396
                    title: Breaking Bad
                    year: 2008
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: A high school chemistry teacher turned methamphetamine manufacturer.
                    genres: [Drama]
                    seasonCount: 5
                    episodeCount: 62
                    status: Ended
                    rating: 8.9
                    community:
                      averageScore: 8.5
                      ratingCount: 14
                      reviewCount: 5
                      recentReviews:
                        - id: 501
                          mediaType: show
                          title: Binge-worthy
                          body: Every episode earns its runtime.
                          createdAt: "2026-05-02T15:00:00.000Z"
                          updatedAt: "2026-05-02T15:00:00.000Z"
                          author:
                            id: 77
                            username: tvfan
        "404":
          description: Show not found or invalid show ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidId:
                  value:
                    error: Show not found
                notFound:
                  value:
                    error: The resource you requested could not be found.
        "502":
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamError:
                  value:
                    error: TMDB request failed with status 500
                genericUpstreamFailure:
                  value:
                    error: TMDB request failed

  /v1/reviews:
    get:
      tags: [Reviews]
      summary: List reviews
      description: Returns paginated reviews with optional media and author filters.
      parameters:
        - in: query
          name: tmdbId
          required: false
          description: Positive TMDB id filter.
          schema:
            type: integer
            minimum: 1
          example: 550
        - in: query
          name: mediaType
          required: false
          description: Filter by media type.
          schema:
            type: string
            enum: [movie, show]
          example: movie
        - in: query
          name: userId
          required: false
          description: Positive user id filter.
          schema:
            type: integer
            minimum: 1
          example: 1
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: pageSize
          required: false
          description: Positive integer page size up to 50. Defaults to 10.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
      responses:
        "200":
          description: Paginated review list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
              examples:
                success:
                  value:
                    page: 1
                    pageSize: 1
                    totalPages: 1
                    totalResults: 1
                    results:
                      - id: 101
                        mediaType: movie
                        title: Great watch
                        body: This movie stayed sharp, focused, and worth revisiting.
                        createdAt: "2026-04-26T18:30:00.000Z"
                        updatedAt: "2026-04-26T18:30:00.000Z"
                        author:
                          id: 1
                          username: reviews-int-owner
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidPage:
                  value:
                    error: Query parameter page must be a positive integer
                invalidPageSize:
                  value:
                    error: Query parameter pageSize must be 50 or less
                invalidMediaType:
                  value:
                    error: Query parameter mediaType must be either movie or show
                invalidTmdbId:
                  value:
                    error: Query parameter tmdbId must be a positive integer
                invalidUserId:
                  value:
                    error: Query parameter userId must be a positive integer
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Reviews]
      summary: Create review
      description: Creates a review for a movie or show. One review per user per item.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreateRequest"
            examples:
              success:
                value:
                  tmdbId: 550
                  mediaType: movie
                  title: Great watch
                  body: This movie stayed sharp, focused, and worth revisiting.
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
              examples:
                success:
                  value:
                    id: 101
                    mediaType: movie
                    title: Great watch
                    body: This movie stayed sharp, focused, and worth revisiting.
                    createdAt: "2026-04-26T18:30:00.000Z"
                    updatedAt: "2026-04-26T18:30:00.000Z"
                    author:
                      id: 1
                      username: reviews-int-owner
        "400":
          description: Invalid review payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                invalidTmdbId:
                  value:
                    error: tmdbId must be a positive integer
                invalidMediaType:
                  value:
                    error: mediaType must be either movie or show
                bodyRequired:
                  value:
                    error: body is required
                invalidBody:
                  value:
                    error: body must be between 10 and 5000 characters
                titleTooLong:
                  value:
                    error: title must be 120 characters or fewer
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          description: Duplicate review for the same user and item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                duplicate:
                  value:
                    error: You have already reviewed this item
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get review by id
      description: Returns one review by its internal id.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive review id.
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        "200":
          description: Review found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
              examples:
                success:
                  value:
                    id: 101
                    mediaType: movie
                    title: Great watch
                    body: This movie stayed sharp, focused, and worth revisiting.
                    createdAt: "2026-04-26T18:30:00.000Z"
                    updatedAt: "2026-04-26T18:30:00.000Z"
                    author:
                      id: 1
                      username: reviews-int-owner
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                notFound:
                  value:
                    error: Review not found
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [Reviews]
      summary: Update review
      description: Updates the title and body for a review owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Positive review id.
          schema:
            type: integer
            minimum: 1
          example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdateRequest"
            examples:
              success:
                value:
                  title: Great watch
                  body: This movie stayed sharp, focused, and worth revisiting.
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
              examples:
                success:
                  value:
                    id: 101
                    mediaType: movie
                    title: Updated title
                    body: This updated review has enough detail for validation to pass.
                    createdAt: "2026-04-26T18:30:00.000Z"
                    updatedAt: "2026-04-27T10:00:00.000Z"
                    author:
                      id: 1
                      username: reviews-int-owner
        "400":
          description: Invalid review payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                bodyRequired:
                  value:
                    error: body is required
                invalidBody:
                  value:
                    error: body must be between 10 and 5000 characters
                titleTooLong:
                  value:
                    error: title must be 120 characters or fewer
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                notFound:
                  value:
                    error: Review not found
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Reviews]
      summary: Delete review
      description: Deletes a review owned by the authenticated user or an admin.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Positive review id.
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        "204":
          description: Review deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                notFound:
                  value:
                    error: Review not found
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/me/reviews:
    get:
      tags: [Reviews]
      summary: List my reviews
      description: Returns the authenticated caller's own reviews. The server identifies the caller from the bearer token only and ignores any caller-supplied userId query parameter.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: pageSize
          required: false
          description: Positive integer page size up to 50. Defaults to 10.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
        - in: query
          name: sort
          required: false
          description: Sort order for the caller's reviews. Defaults to `createdAt:desc`.
          schema:
            type: string
            enum: ["createdAt:desc", "createdAt:asc"]
            default: "createdAt:desc"
          example: "createdAt:desc"
      responses:
        "200":
          description: Paginated list of the authenticated user's reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
              examples:
                success:
                  value:
                    page: 1

    CommunitySummary:
      type: object
      description: |
        Local community ratings and reviews for a TMDB title. Returned as a sibling of TMDB fields
        on movie and TV show detail responses.
      required:
        - averageScore
        - ratingCount
        - reviewCount
        - recentReviews
      properties:
        averageScore:
          type: number
          format: float
          nullable: true
          description: Mean user rating score when at least one rating exists; null when there are no ratings.
          example: 8.5
        ratingCount:
          type: integer
          minimum: 0
          description: Number of user ratings for this TMDB id and media type.
          example: 14
        reviewCount:
          type: integer
          minimum: 0
          description: Total number of user reviews for this TMDB id and media type.
          example: 5
        recentReviews:
          type: array
          description: >
            Most recent reviews, newest first (server limits length, typically three items). Each entry
            matches ReviewResponse, including an `author` object with resolved display `username`.
          items:
            $ref: "#/components/schemas/ReviewResponse"


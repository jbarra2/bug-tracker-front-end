                  description: Clicking the login button causes a 500 error.
              full:
                value:
                  title: App crashes on login
                  description: Clicking the login button causes a 500 error.
                  reproductionSteps: "1. Open the app\n2. Navigate to login\n3. Click the login button"
                  reporterContact: reporter@example.com
      responses:
        "201":
          description: Bug report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
              examples:
                success:
                  value:
                    id: 1
                    status: open
                    createdAt: "2026-05-01T12:00:00.000Z"
        "400":
          description: Validation error — title or description missing, empty, or wrong type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingTitle:
                  value:
                    error: title is required
                missingDescription:
                  value:
                    error: description is required
                badFieldType:
                  value:
                    error: reproductionSteps must be a string
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Issues]
      summary: List bug reports (admin)
      description: >
        Admin-gated paginated queue of bug reports. Requires an Auth² bearer token whose role
        is authorized by local database role checks. Token role claims alone are not sufficient.
        Defaults: `page=1`, `pageSize=10` (max `50`), `sort=createdAt:desc`. Optional `status`
        filter restricts results to one IssueStatus value.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          description: 1-indexed page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: pageSize
          required: false
          description: Page size. Defaults to 10. Maximum 50.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
        - in: query
          name: status
          required: false
          description: Optional IssueStatus filter.
          schema:
            type: string

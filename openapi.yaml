              examples:
                invalidStatus:
                  value:
                    error: "Query parameter status must be one of: open, in_progress, resolved, closed"
                invalidSort:
                  value:
                    error: "Query parameter sort must be one of: createdAt:desc, createdAt:asc"
                invalidPageSize:
                  value:
                    error: Query parameter pageSize must be 50 or less
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
